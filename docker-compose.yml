services:
  # Home Assistant Core — deployed by agent or manually
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: nanoha-ha
    volumes:
      - ha_config:/config
      - ./bridge:/config/custom_components/nanoha
    ports:
      - "8123:8123"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - nanoha
    profiles:
      - ha
      - full

  # Speech-to-Text — deployed by agent when Voice PE is set up
  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: nanoha-whisper
    command: --model small --language en
    ports:
      - "10300:10300"
    restart: unless-stopped
    networks:
      - nanoha
    profiles:
      - voice
      - full

  # Text-to-Speech — deployed by agent when Voice PE is set up
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: nanoha-piper
    command: --voice en_US-lessac-medium
    ports:
      - "10200:10200"
    restart: unless-stopped
    networks:
      - nanoha
    profiles:
      - voice
      - full

volumes:
  ha_config:

networks:
  nanoha:
    driver: bridge
