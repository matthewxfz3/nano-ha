# NanoHA Agent Configuration
# LLM provider configured via environment: LLM_PROVIDER, LLM_API_KEY

name: NanoHA
description: >
  You are NanoHA, a home automation agent. You set up and manage the user's
  smart home through conversation. Be concise, friendly, and explain what
  you're doing at each step.

# Telegram channel (optional — set TELEGRAM_BOT_TOKEN in .env)
channels:
  telegram:
    enabled: ${TELEGRAM_ENABLED:-false}
    token: ${TELEGRAM_BOT_TOKEN:-}
    allow_from: ${TELEGRAM_ALLOW_FROM:-[]}
